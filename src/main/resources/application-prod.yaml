spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    expiration-ms: ${JWT_EXPIRATION_MS:36000000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
